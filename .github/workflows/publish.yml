
name: Publish

on:
  push:
    tags:
      - 'v*'

# permissions:
  contents: read    # Allows the runner to pull your repository code
  id-token: write   # Allows the runner to securely authenticate with crates.io

name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify build
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Publish to crates.io
        run: cargo publish
